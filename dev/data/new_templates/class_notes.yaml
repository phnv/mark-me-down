id: class_notes

name: Class Notes

description: >
  A structured template for capturing notes during lectures, workshops,
  university classes, online courses, training sessions, bootcamps and
  educational presentations. It emphasizes separating factual class content
  from personal reflections, questions and future study actions. The template
  supports active learning, later revision and long-term knowledge retention.

