instructions: >
  Record information as the class progresses. Capture concepts rather than
  verbatim transcription whenever possible. Use the "Questions & Doubts"
  section for unresolved topics, "Insights" for important realizations and
  "Quick Thoughts" for spontaneous observations. Summarize the lecture before
  finishing the note.

