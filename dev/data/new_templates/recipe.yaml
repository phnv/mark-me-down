preview_markdown: |
  ---
  recipe: Chocolate Cake
  servings: 8
  prep_time: 20 min
  cook_time: 40 min
  difficulty: Easy
  ---

  # Description

  Moist homemade chocolate cake.

  # Ingredients

  - [ ] 2 cups flour
  - [ ] 1 cup cocoa powder
  - [ ] 2 eggs
  - [ ] 1 cup milk

  # Equipment

  - Mixing bowl
  - Cake pan

  # Preparation

  - [ ] Preheat oven to 180°C
  - [ ] Mix dry ingredients
  - [ ] Add wet ingredients
  - [ ] Bake for 40 minutes

  # Serving Suggestions

  Serve warm with vanilla ice cream.

  # Variations

  Add walnuts.

  # Notes

  Bake 5 minutes less for softer texture.

